# Git hook automation powered by prek.
# Install with: bunx prek install -t pre-commit -t pre-push
# See: https://github.com/j178/prek

repos:
  - repo: local
    hooks:
      - id: beads-sync
        name: Sync Beads JSONL
        entry: bash -c 'if ! command -v br >/dev/null || [ ! -d .beads ]; then exit 0; fi; br sync --flush-only; git diff --quiet -- .beads || { echo "Beads JSONL changed after sync. Stage .beads/ and commit again."; exit 1; }'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: beads-clean
        name: Check Beads state is committed
        entry: bash -c 'if command -v br >/dev/null && [ -d .beads ]; then br sync --flush-only; fi; git diff --quiet -- .beads && git diff --cached --quiet -- .beads || { echo "Beads state is not committed. Run br sync --flush-only, stage .beads/, and commit it."; exit 1; }'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: build
        name: Build
        entry: bun run build
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: typecheck
        name: Typecheck
        entry: bun run typecheck
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: lint
        name: Lint
        entry: bun run lint
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: test
        name: Test
        entry: bun run test
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: validate-evals
        name: Validate eval YAML files
        entry: bun run validate:examples
        language: system
        pass_filenames: false
        stages: [pre-push]
