targets:
  - id: local-openai
    provider: openai
    model: ${{ LOCAL_OPENAI_PROXY_MODEL }}
    grader_target: local-openai-grader
    config:
      base_url: ${{ LOCAL_OPENAI_PROXY_BASE_URL }}
      api_key: ${{ LOCAL_OPENAI_PROXY_API_KEY }}
  - id: local-openai-grader
    provider: openai
    model: ${{ LOCAL_OPENAI_PROXY_MODEL }}
    config:
      base_url: ${{ LOCAL_OPENAI_PROXY_BASE_URL }}
      api_key: ${{ LOCAL_OPENAI_PROXY_API_KEY }}
