# AgentV Evaluation Targets
# Consolidated from root, examples/features, and examples/showcase.
# Per-eval .agentv folders override these for specific eval cases.

targets:
  - name: default
    provider: openai
    base_url: https://models.github.ai/inference
    api_key: ${{ GH_MODELS_TOKEN }}
    model: ${{ GH_MODELS_MODEL }}

  - name: copilot-cli
    provider: copilot-cli
    model: ${{ COPILOT_MODEL }}
    grader_target: default
    log_format: json

  - name: copilot-sdk
    provider: copilot-sdk
    model: ${{ COPILOT_MODEL }}
    grader_target: default
    log_format: json

  - name: claude
    provider: claude
    grader_target: default
    log_format: json

  - name: claude-sdk
    provider: claude-sdk
    grader_target: default
    log_format: json

  - name: pi
    provider: pi-coding-agent
    subprovider: openrouter
    model: ${{ OPENROUTER_MODEL }}
    api_key: ${{ OPENROUTER_API_KEY }}
    grader_target: default
    tools: read,bash,edit,write
    log_format: json

  - name: pi-cli
    provider: pi-cli
    subprovider: openrouter
    model: ${{ OPENROUTER_MODEL }}
    api_key: ${{ OPENROUTER_API_KEY }}
    grader_target: default

  - name: codex
    provider: codex
    grader_target: default
    cwd: ${{ CODEX_WORKSPACE_DIR }}
    log_dir: ${{ CODEX_LOG_DIR }}
    log_format: json

  - name: azure
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}

  - name: azure-llm
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}
    version: ${{ AZURE_OPENAI_API_VERSION }}

  - name: gemini-llm
    provider: gemini
    api_key: ${{ GOOGLE_GENERATIVE_AI_API_KEY }}
    model: ${{ GEMINI_MODEL_NAME }}

  - name: gemini-flash
    provider: gemini
    model: gemini-3-flash-preview
    api_key: ${{ GOOGLE_GENERATIVE_AI_API_KEY }}

  - name: openai
    provider: openai
    endpoint: ${{ OPENAI_ENDPOINT }}
    api_key: ${{ OPENAI_API_KEY }}
    model: ${{ OPENAI_MODEL }}

  - name: openrouter
    provider: openrouter
    api_key: ${{ OPENROUTER_API_KEY }}
    model: ${{ OPENROUTER_MODEL }}
