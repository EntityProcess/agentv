# AgentV Evaluation Targets
# Consolidated from root, examples/features, and examples/showcase.
# Per-eval .agentv folders override these for specific eval cases.
#
# "grader" is the LLM used for scoring; agent targets reference it via
# grader_target so eval execution and grading use separate models.

targets:
  # ── Default target (alias) ───────────────────────────────────────────
  # Evals without an explicit target resolve to "default". The alias
  # redirects to a named target, controlled via AGENT_TARGET env var.
  # One env var switches the entire provider config (auth, model, etc.).
  # Example: AGENT_TARGET=copilot-cli  or  AGENT_TARGET=claude
  - name: default
    alias: ${{ AGENT_TARGET }}
    provider: mock

  # ── LLM target (text generation, no agent binary needed) ────────────
  - name: llm
    provider: openrouter
    api_key: ${{ OPENROUTER_API_KEY }}
    model: ${{ OPENROUTER_MODEL }}

  # ── Grader (LLM-as-judge) ──────────────────────────────────────────
  - name: grader
    provider: openrouter
    api_key: ${{ OPENROUTER_API_KEY }}
    model: ${{ OPENROUTER_MODEL }}

  # ── Named agent targets ───────────────────────────────────────────
  - name: copilot-cli
    provider: copilot-cli
    model: ${{ COPILOT_MODEL }}
    grader_target: grader
    log_format: json

  - name: copilot-sdk
    provider: copilot-sdk
    model: ${{ COPILOT_MODEL }}
    grader_target: grader
    log_format: json

  - name: claude
    provider: claude
    grader_target: grader
    log_format: json

  - name: claude-sdk
    provider: claude-sdk
    grader_target: grader
    log_format: json

  - name: pi
    provider: pi-coding-agent
    subprovider: openrouter
    model: ${{ OPENROUTER_MODEL }}
    api_key: ${{ OPENROUTER_API_KEY }}
    grader_target: grader
    tools: read,bash,edit,write
    log_format: json

  - name: pi-cli
    provider: pi-cli
    subprovider: openrouter
    model: ${{ OPENROUTER_MODEL }}
    api_key: ${{ OPENROUTER_API_KEY }}
    grader_target: grader

  - name: codex
    provider: codex
    grader_target: grader
    cwd: ${{ CODEX_WORKSPACE_DIR }}
    log_dir: ${{ CODEX_LOG_DIR }}
    log_format: json

  # ── LLM targets (direct model access) ─────────────────────────────
  - name: azure-llm
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}
    version: ${{ AZURE_OPENAI_API_VERSION }}

  - name: gemini-llm
    provider: gemini
    api_key: ${{ GOOGLE_GENERATIVE_AI_API_KEY }}
    model: ${{ GEMINI_MODEL_NAME }}

  - name: gemini-flash
    provider: gemini
    model: gemini-3-flash-preview
    api_key: ${{ GOOGLE_GENERATIVE_AI_API_KEY }}

  - name: openai
    provider: openai
    endpoint: ${{ OPENAI_ENDPOINT }}
    api_key: ${{ OPENAI_API_KEY }}
    model: ${{ OPENAI_MODEL }}

  - name: openrouter
    provider: openrouter
    api_key: ${{ OPENROUTER_API_KEY }}
    model: ${{ OPENROUTER_MODEL }}
