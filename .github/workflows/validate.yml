name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check relative markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --glob-ignore-case
            --root-dir .
            "**/*.md"
