name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: string
      ref:
        description: "Git tag or ref to publish"
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true
      GH_MODELS_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - publish-next
          - publish-latest
        default: publish-next
      ref:
        description: "Git tag or ref to publish (defaults to the workflow ref)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect and validate channel
        id: channel
        run: |
          set -euo pipefail

          ACTION="${{ inputs.action }}"
          VERSION=$(node -p "require('./apps/cli/package.json').version")
          RELEASE_TAG="v${VERSION}"
          CHECKOUT_TAG=$(git tag --points-at HEAD | grep -Fx "$RELEASE_TAG" | head -n 1 || true)

          if [ -z "$CHECKOUT_TAG" ]; then
            echo "::error::Publish checkout must point at $RELEASE_TAG; tags at HEAD are:"
            git tag --points-at HEAD || true
            exit 1
          fi

          if [ -z "$ACTION" ]; then
            if [[ "$VERSION" == *"-next."* ]]; then
              ACTION="publish-next"
            else
              ACTION="publish-latest"
            fi
          fi

          case "$ACTION" in
            publish-next|publish-latest) ;;
            *)
              echo "::error::Invalid publish action: $ACTION"
              exit 1
              ;;
          esac

          if [[ "$VERSION" == *"-next."* ]]; then
            if [ "$ACTION" != "publish-next" ]; then
              echo "::error::Cannot publish prerelease $VERSION with action $ACTION"
              exit 1
            fi
          else
            if [ "$ACTION" != "publish-latest" ]; then
              echo "::error::Cannot publish stable version $VERSION with action $ACTION"
              exit 1
            fi
          fi

          echo "Publishing $RELEASE_TAG with $ACTION"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      # Latest promotion is blocked on a tiny live contract eval. The gate uses
      # a Models-capable PAT secret, while npm publish still uses NPM_TOKEN.
      - name: Run contract eval gate
        if: steps.channel.outputs.action == 'publish-latest'
        run: bun run contract-eval
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          CONTRACT_EVAL_MODEL: ${{ vars.CONTRACT_EVAL_MODEL || 'openai/gpt-4.1-mini' }}

      - name: Publish to npm
        run: |
          if [ "${{ steps.channel.outputs.action }}" = "publish-next" ]; then
            bun run publish:next
          else
            bun run publish
          fi
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
