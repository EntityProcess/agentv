target: codex-live
prompts:
  - "{{ input }}"
tests:
  - id: skill-used-live
    vars: {}
    assert:
      - metric: skill-used-codex/list_mcp_resources
        type: skill-used
        value: codex/list_mcp_resources
      - metric: llm-rubric
        type: llm-rubric
        prompt: undefined
        rubrics:
          - id: rubric-1
            outcome: Response is one sentence and includes MCP_RESOURCES_CHECKED
            weight: 1
            required: true
          - id: rubric-2
            outcome: The assistant attempted or completed an MCP resource inspection before answering
            weight: 1
            required: true
