targets:
  - id: pi-cli-local-openai
    model: ${{ LOCAL_OPENAI_PROXY_MODEL }}
    provider: pi-cli
    config:
      subprovider: openai
      base_url: ${{ LOCAL_OPENAI_PROXY_BASE_URL }}
      api_key: ${{ LOCAL_OPENAI_PROXY_API_KEY }}
      thinking: low
      tools: none
      stream_log: raw
      timeout_seconds: 180
      runtime: host
      model: ${{ LOCAL_OPENAI_PROXY_MODEL }}
