# Bug Fix Benchmark Targets
# Each target uses a different workspace template with different plugins installed.
# This lets you compare baseline vs plugin-augmented agent performance.

targets:
  # ============================================================
  # MOCK AGENT - Fastest, no auth required, for testing harness
  # ============================================================
  - name: mock_agent
    provider: cli
    command: bash scripts/mock-agent.sh {PROMPT_FILE} {OUTPUT_FILE}
    grader_target: mock_grader

  - name: mock_grader
    provider: mock

  # ============================================================
  # BASELINE - Claude Code with no plugins
  # Measures raw agent capability without any workflow enhancement.
  # ============================================================
  - name: claude-baseline
    provider: claude
    workspace_template: ./workspaces/baseline
    grader_target: azure-base

  # ============================================================
  # WITH SUPERPOWERS - obra/superpowers
  # Subagent-driven development, TDD, git worktree isolation.
  # https://github.com/obra/superpowers
  # ============================================================
  - name: claude-superpowers
    provider: claude
    workspace_template: ./workspaces/superpowers
    grader_target: azure-base

  # ============================================================
  # WITH COMPOUND ENGINEERING - EveryInc/compound-engineering-plugin
  # Cyclical workflow: brainstorm → plan → work → review → compound → repeat.
  # https://github.com/EveryInc/compound-engineering-plugin
  # ============================================================
  - name: claude-compound
    provider: claude
    workspace_template: ./workspaces/compound
    grader_target: azure-base

  # ============================================================
  # WITH AGENT SKILLS - addyosmani/agent-skills
  # 20 production-grade engineering skills from Google culture.
  # https://github.com/addyosmani/agent-skills
  # ============================================================
  - name: claude-agent-skills
    provider: claude
    workspace_template: ./workspaces/agent-skills
    grader_target: azure-base

  # ============================================================
  # GRADER TARGETS
  # ============================================================

  # Azure OpenAI for LLM-based grading
  - name: azure-base
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}

  # OpenAI alternative for grading
  - name: openai-grader
    provider: openai
    api_key: ${{ OPENAI_API_KEY }}
    model: gpt-4o
