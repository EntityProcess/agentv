# Bug Fix Benchmark Targets
# A single base Claude target is defined here. Per-variant plugin setup
# is handled by target-level hooks in the eval file's execution.targets.

targets:
  # ============================================================
  # MOCK AGENT - Fastest, no auth required, for testing harness
  # ============================================================
  - name: mock_agent
    provider: cli
    command: bash scripts/mock-agent.sh {PROMPT_FILE} {OUTPUT_FILE}
    grader_target: mock_grader

  - name: mock_grader
    provider: mock

  # ============================================================
  # BASE CLAUDE TARGET
  # Used by execution.targets in eval files via use_target.
  # Each variant adds its own before_each hook to install plugins.
  #
  # Set CLAUDE_EXECUTABLE to use a custom binary (e.g. claude-zai).
  # Defaults to "claude" if unset.
  # ============================================================
  - name: claude
    provider: claude-cli
    executable: ${{ CLAUDE_EXECUTABLE }}
    grader_target: azure-base

  # ============================================================
  # GRADER TARGETS
  # ============================================================

  # Azure OpenAI for LLM-based grading
  - name: azure-base
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}

  # OpenAI alternative for grading
  - name: openai-grader
    provider: openai
    api_key: ${{ OPENAI_API_KEY }}
    model: gpt-4o
