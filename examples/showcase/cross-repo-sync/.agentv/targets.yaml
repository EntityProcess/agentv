targets:
  - name: mock_agent
    provider: cli
    command: bash mock-agent.sh {PROMPT} {OUTPUT_FILE}

  - name: claude_agent
    provider: claude

  - name: copilot_agent
    provider: copilot-cli
    model: claude-haiku-4.5

  - name: azure_judge
    provider: azure
    model: ${{ AZURE_DEPLOYMENT_NAME }}
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
