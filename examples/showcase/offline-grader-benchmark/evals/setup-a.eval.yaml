description: Offline grader benchmark — setup A (same dataset, three low-cost
  graders, majority vote)
providers:
  - fixture_replay
tests:
  - file://../fixtures/labeled-grader-export.jsonl

assert:
  - metric: grader-panel
    type: assert-set
    threshold: 0.6
    assert:
      - metric: grader-gpt-5-mini
        type: llm-rubric
        target: grader_gpt_5_mini
        prompt: file://../prompts/grader-pass-fail-v1.md
      - metric: grader-claude-haiku
        type: llm-rubric
        target: grader_claude_haiku
        prompt: file://../prompts/grader-pass-fail-v1.md
      - metric: grader-gemini-flash
        type: llm-rubric
        target: grader_gemini_flash
        prompt: file://../prompts/grader-pass-fail-v1.md
