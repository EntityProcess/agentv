description: Keyword-matching grader used for conformance testing demo
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: exact-match
    assert:
      - metric: keyword-grader
        type: script
        command:
          - bun
          - run
          - graders/keyword-grader.ts
      - Answer must name the capital city of France.
    vars:
      input: What is the capital of France?
      expected_output: Paris
  - id: partial-match
    assert:
      - metric: keyword-grader
        type: script
        command:
          - bun
          - run
          - graders/keyword-grader.ts
      - Answer must mention red, blue, and yellow.
    vars:
      input: Name the primary colors.
      expected_output: red, blue, yellow
