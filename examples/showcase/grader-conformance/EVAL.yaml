# Grader Conformance Demo
# Demonstrates using the keyword-grader grader in a standard AgentV eval.
#
# Validate: cd examples/showcase/grader-conformance
#           npx agentv validate EVAL.yaml
#
# The conformance harness validates this grader separately:
#      bun run conformance-check.ts

description: Keyword-matching grader used for conformance testing demo

target: llm

tests:
  - id: exact-match
    criteria: "Answer must name the capital city of France."
    input: "What is the capital of France?"
    expected_output: "Paris"
    assertions:
      - name: keyword-grader
        type: code-grader
        command: ["bun", "run", "graders/keyword-grader.ts"]

  - id: partial-match
    criteria: "Answer must mention red, blue, and yellow."
    input: "Name the primary colors."
    expected_output: "red, blue, yellow"
    assertions:
      - name: keyword-grader
        type: code-grader
        command: ["bun", "run", "graders/keyword-grader.ts"]
