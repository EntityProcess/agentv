targets:
  - id: live_coding_agent
    provider: codex-cli
    model: gpt-5
    timeout_seconds: 300

  - id: replay_coding_agent
    provider: replay
    fixtures: ../fixtures/replay-target-output.jsonl
    suite: trace-evaluation-showcase
    source_target: live_coding_agent

  - id: replay_imported_codex_transcript
    provider: replay
    transcripts: ../fixtures/imported-codex-transcript.jsonl
    source_target: codex
