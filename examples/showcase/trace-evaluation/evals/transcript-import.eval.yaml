description: Trace grading over an imported Codex transcript fixture
prompts:
  - "{{ input }}"
tests:
  - id: imported-codex-config-fix
    assert:
      - metric: imported-tool-sequence
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - Read
            - Grep
            - Edit
      - type: trajectory:tool-args-match
        value:
          name: Read
          args:
            path: package.json
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: Grep
          args:
            pattern: timeout
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: Edit
          args:
            path: src/config.ts
          mode: partial
      - metric: imported-execution-budget
        type: execution-metrics
        max_tool_calls: 5
        max_llm_calls: 5
        max_duration_ms: 5000
      - metric: replay-proof
        type: script
        command:
          - bun
          - run
          - ../graders/replay-proof.ts
        require_metrics: false
    vars:
      input:
        - role: user
          content: Inspect the project and change the default request timeout to 5000ms.
