description: Replay-first coding-agent trace evaluation showcase
target: replay_coding_agent
prompts:
  - "{{ input }}"
tests:
  - id: inspect-and-fix-config
    assert:
      - metric: expected-tool-sequence
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - Read
            - Grep
            - Edit
      - type: trajectory:tool-args-match
        value:
          name: Read
          args:
            path: package.json
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: Grep
          args:
            pattern: timeout
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: Edit
          args:
            path: src/config.ts
          mode: partial
      - metric: execution-budget
        type: execution-metrics
        max_tool_calls: 5
        max_llm_calls: 3
        max_tokens: 2000
        max_cost_usd: 0.01
        max_duration_ms: 2000
      - metric: replay-proof
        type: script
        command:
          - bun
          - run
          - ../graders/replay-proof.ts
      - |-
        The coding agent should inspect the repository before editing, find the timeout
        configuration, and update only the expected config file.
    vars:
      input:
        - role: user
          content: Inspect the project and change the default request timeout to 5000ms.
  - id: recover-from-tool-error
    assert:
      - metric: recovery-sequence
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - Read
            - Read
            - Edit
      - type: trajectory:tool-args-match
        value:
          name: Read
          args:
            path: src/missing-config.ts
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: Read
          args:
            path: src/config.ts
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: Edit
          args:
            path: src/config.ts
          mode: partial
      - metric: recovery-check
        type: script
        command:
          - bun
          - run
          - ../graders/recovery-check.ts
      - metric: execution-budget
        type: execution-metrics
        max_tool_calls: 5
        max_llm_calls: 4
        max_tokens: 2500
        max_cost_usd: 0.02
        max_duration_ms: 2500
      - metric: replay-proof
        type: script
        command:
          - bun
          - run
          - ../graders/replay-proof.ts
      - |-
        The coding agent should recover from a failed file read, continue with a
        valid path, and explain the successful config change.
    vars:
      input:
        - role: user
          content: Fix the retry limit bug in the config module. If a file path is wrong, recover and
            continue.
