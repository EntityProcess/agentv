name: code-grader-contract
description: Release gate verifying the code-grader stdin payload contract.

target: github-models-contract

tests:
  - id: code-grader-stdin-payload
    input:
      - role: system
        content: "Use the literal token RELEASE as the first word in your response."
      - role: user
        content: "Use the literal token CONTRACT as the second word in your response."
    assert:
      - metric: code-grader-payload-contract
        type: script
        command: [ "bun", "../scripts/check-code-grader-payload.ts" ]
      - Response includes both literal tokens RELEASE and CONTRACT.
