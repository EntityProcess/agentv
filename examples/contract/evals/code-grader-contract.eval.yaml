name: code-grader-contract
description: Release gate verifying the code-grader stdin payload contract.

execution:
  target: github-models-contract
  workers: 1

tests:
  - id: code-grader-stdin-payload
    criteria: Response includes the literal token CONTRACT.
    input:
      - role: system
        content: "Answer release contract checks with concise text."
      - role: user
        content: "Please respond with the literal token CONTRACT."
    assertions:
      - name: code-grader-payload-contract
        type: code-grader
        command: ["bun", "../scripts/check-code-grader-payload.ts"]
