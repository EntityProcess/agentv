name: multi-model-benchmark
description: Compare greeting, code generation, and summarization across three model targets
providers:
  - llm
prompts:
  - "{{ input }}"
tests:
  - id: greeting
    assert:
      - A warm, welcoming greeting that is professional and helpful
    vars:
      input: Generate a friendly greeting for a new user
  - id: code-generation
    assert:
      - A correct, efficient implementation of linked list reversal
    vars:
      input: Write a function to reverse a linked list
  - id: summarization
    assert:
      - A concise summary covering revenue, margins, and guidance
    vars:
      input: Summarize the key points of the quarterly earnings report
