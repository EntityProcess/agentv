# Run Output Consistency Grader
# Measures how consistent an agent's outputs are across repeated runs
# using pairwise cosine similarity (embedding-based or token-overlap fallback).
#
# Run:
#   bun agentv eval examples/features/run-output-consistency/evals/dataset.eval.yaml --dry-run

description: Run output consistency via embedding similarity

execution:
  target: llm

tests:
  # ── High consistency: semantically identical outputs ──────────────
  - id: high-consistency
    criteria: Agent produces consistent answers across runs.

    input:
      - role: user
        content: What is the capital of France?

    expected_output:
      - role: assistant
        content: The capital of France is Paris.

    assertions:
      - name: run-consistency
        type: code-grader
        command: ["bun", "run", "../graders/run-consistency.ts"]
        config:
          fallback: token
          runOutputs:
            - "The capital of France is Paris."
            - "Paris is the capital of France."
            - "France's capital city is Paris."

  # ── Low consistency: divergent outputs ────────────────────────────
  - id: low-consistency
    criteria: Agent produces inconsistent answers across runs.

    input:
      - role: user
        content: Write a creative tagline for a coffee shop.

    expected_output:
      - role: assistant
        content: Any creative tagline.

    assertions:
      - name: run-consistency
        type: code-grader
        command: ["bun", "run", "../graders/run-consistency.ts"]
        config:
          fallback: token
          runOutputs:
            - "Wake up and smell the magic."
            - "Brewed with love, served with a smile."
            - "Where every cup tells a story."

  # ── Edge case: single run ──────────────────────────────────────
  - id: single-run
    criteria: Single run returns perfect consistency.

    input:
      - role: user
        content: What is 2 + 2?

    expected_output:
      - role: assistant
        content: "4"

    assertions:
      - name: run-consistency
        type: code-grader
        command: ["bun", "run", "../graders/run-consistency.ts"]
        config:
          fallback: token
          runOutputs:
            - "The answer is 4."

  # ── Edge case: zero runs ──────────────────────────────────────
  - id: zero-runs
    criteria: Zero runs returns an error score.

    input:
      - role: user
        content: Hello

    expected_output:
      - role: assistant
        content: Hi

    assertions:
      - name: run-consistency
        type: code-grader
        command: ["bun", "run", "../graders/run-consistency.ts"]
        config:
          fallback: token
          runOutputs: []
