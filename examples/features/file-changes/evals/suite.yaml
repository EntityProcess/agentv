name: file-changes
description: Verify file_changes captures edits, creates, and deletes across multiple tests
environment:
  type: host
  workdir: ../workspace-template
target: mock_agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-edits-and-creates
    assert:
      - metric: check-edits-and-creates
        type: script
        command:
          - uv
          - run
          - ../check_file_changes.py
        expect_edited:
          - hello.txt
          - config.json
        expect_created:
          - src/utils.ts
          - tests/main.test.ts
      - file_changes diff shows hello.txt and config.json as edited, src/utils.ts and
        tests/main.test.ts as newly created
    vars:
      input:
        - role: user
          content:
            - type: text
              value: Edit hello.txt and config.json, create src/utils.ts and tests/main.test.ts, delete
                obsolete.log.
  - id: verify-deletes-and-structure
    assert:
      - metric: check-deletes-and-structure
        type: script
        command:
          - uv
          - run
          - ../check_file_changes.py
        expect_deleted:
          - obsolete.log
        expect_edited:
          - hello.txt
          - config.json
        expect_created:
          - src/utils.ts
          - tests/main.test.ts
      - file_changes diff shows obsolete.log as deleted and the overall diff covers all 5 changed
        files in unified diff format
    vars:
      input:
        - role: user
          content:
            - type: text
              value: Edit hello.txt and config.json, create src/utils.ts and tests/main.test.ts, delete
                obsolete.log.
