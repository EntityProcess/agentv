name: compare-demo
description: Demo eval for generating baseline and candidate results to compare
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: code-review-001
    assert:
      - type: contains
        value: bug
      - type: contains
        value: fix
      - Identifies at least one issue and suggests a fix
    vars:
      input: Review the following code for bugs and suggest improvements.
  - id: code-review-002
    assert:
      - type: contains
        value: function
      - type: contains
        value: optim
      - Provides a clear explanation and at least one optimization suggestion
    vars:
      input: Explain what this function does and how it could be optimized.
  - id: code-review-003
    assert:
      - type: contains
        value: error
      - type: regex
        value: edge.?case|missing|exception|null
      - Identifies missing error handling or edge cases
    vars:
      input: Review this error handling code for edge cases and missing checks.
  - id: code-gen-001
    assert:
      - type: contains
        value: palindrome
      - Returns working code that handles basic palindrome cases
    vars:
      input: Write a function that checks if a string is a palindrome.
  - id: code-gen-002
    assert:
      - type: regex
        value: subsequence|lcs|LCS
      - Returns a correct implementation with reasonable time complexity
    vars:
      input: Write a function that finds the longest common subsequence of two strings.
