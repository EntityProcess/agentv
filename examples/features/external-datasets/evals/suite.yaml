name: external-datasets-demo
version: "1.0"
providers:
  - llm
prompts:
  - "{{ input }}"
tests:
  - file://cases/accuracy.yaml
  - file://cases/regression.jsonl
  - file://cases/magic.csv
  - id: inline-test
    assert:
      - The agent should greet the user politely
    vars:
      input: Hello, how are you?
