description: >-
  E2E test for workspace pooling. Run with --workspace-mode pooled
  --workers 2 to exercise multiple pool slots. Normal shared repo
  workspaces use fresh temp materialization by default.

workspace:
  repos:
    - path: ./repo
      repo: https://github.com/EntityProcess/agentv.git
      commit: main

tags: [agent]

tests:
  - id: test-1-core-name
    criteria: Report the core package name
    input: Read repo/packages/core/package.json and tell me the package name.
    assertions:
      - type: contains
        value: "@agentv/core"

  - id: test-2-cli-name
    criteria: Report the CLI package name
    input: Read repo/apps/cli/package.json and tell me the package name.
    assertions:
      - type: contains
        value: "agentv"
