description: "Demonstrates workspace repo lifecycle: clone a git repo into the workspace, check out
  a specific commit, and have the agent work on it."
workspace:
  scope: suite
  repos:
    - path: ./repo
      repo: https://github.com/EntityProcess/agentv.git
      commit: main
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: describe-package
    assert:
      - type: contains
        value: "@agentv/core"
      - type: regex
        value: \d+\.\d+\.\d+
      - The agent should read packages/core/package.json from the cloned repo and correctly report
        the package name and version.
    vars:
      input: Read the file at repo/packages/core/package.json and tell me the exact package name and
        version number.
