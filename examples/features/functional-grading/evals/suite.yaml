name: functional-grading
description: Functional grading with workspace_path — deploy-and-test pattern
environment:
  type: host
  workdir: ../workspace-template
target: mock_agent
prompts:
  - "{{ input }}"
tests:
  - id: implement-math-functions
    assert:
      - metric: functional-check
        type: script
        command:
          - bun
          - run
          - ../scripts/functional-check.ts
      - Agent implements add, multiply, and fibonacci functions that pass functional validation
        checks
    vars:
      input: Implement the add, multiply, and fibonacci functions in src/index.ts. The function signatures
        are already defined — replace the throw statements with working implementations.
