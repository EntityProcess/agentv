# A list of all supported evaluation targets for the project.
# Each target defines a provider and its specific configuration.
# Actual values for paths/keys are stored in the local .env file.

targets:
  - name: default
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}

  - name: openai
    provider: openai
    endpoint: ${{ OPENAI_ENDPOINT }}
    api_key: ${{ OPENAI_API_KEY }}
    model: ${{ OPENAI_MODEL }}

  - name: openrouter
    provider: openrouter
    api_key: ${{ OPENROUTER_API_KEY }}
    model: ${{ OPENROUTER_MODEL }}

  - name: codex
    provider: codex
    grader_target: gemini-llm
    # Uses the Codex CLI (defaults to `codex` on PATH)
    # executable: ${{ CODEX_CLI_PATH }}        # Optional: override executable path
    # args:                             # Optional additional CLI arguments
    #   - --profile
    #   - ${{ CODEX_PROFILE }}
    #   - --model
    #   - ${{ CODEX_MODEL }}
    #   - --ask-for-approval
    #   - ${{ CODEX_APPROVAL_PRESET }}
    cwd: ${{ CODEX_WORKSPACE_DIR }}            # Where scratch workspaces are created
    log_dir: ${{ CODEX_LOG_DIR }}              # Optional: where Codex CLI stream logs are stored (defaults to ./.agentv/logs/codex)
    log_format: json                    # Optional: 'summary' (default) or 'json' for raw event logs

  - name: azure-llm
    provider: azure
    endpoint: ${{ AZURE_OPENAI_ENDPOINT }}
    api_key: ${{ AZURE_OPENAI_API_KEY }}
    model: ${{ AZURE_DEPLOYMENT_NAME }}
    version: ${{ AZURE_OPENAI_API_VERSION }}

  - name: gemini-llm
    provider: gemini
    api_key: ${{ GOOGLE_GENERATIVE_AI_API_KEY }}
    model: ${{ GEMINI_MODEL_NAME }}

  # Pi Coding Agent - autonomous coding agent from pi-mono (SDK)
  - name: pi
    provider: pi-coding-agent
    subprovider: openrouter
    model: openai/gpt-5.4
    api_key: ${{ OPENROUTER_API_KEY }}
    grader_target: gemini-llm
    tools: read,bash,edit,write  # Default tools for coding tasks
    log_format: json  # 'summary' (default) or 'json' for raw event logs
    # system_prompt: optional override (default instructs agent to include code in response)

  # Pi CLI - subprocess-based Pi agent
  - name: pi-cli
    provider: pi-cli
    subprovider: openrouter
    model: openai/gpt-5.4
    api_key: ${{ OPENROUTER_API_KEY }}
    grader_target: gemini-llm
    log_format: json

  # GitHub Copilot - CLI subprocess
  - name: copilot
    provider: copilot-cli
    model: gpt-5-mini
    grader_target: gemini-llm
    log_format: json

  # GitHub Copilot - SDK
  # Note: copilot-sdk discovers skills via grep (keyword search) rather than
  # reading skill files directly. The skill-trigger evaluator only checks tool
  # inputs for the skill name, so copilot-sdk may fail positive trigger cases.
  - name: copilot-sdk
    provider: copilot-sdk
    model: gpt-5-mini
    grader_target: gemini-llm
    log_format: json

  # Claude - CLI subprocess
  - name: claude
    provider: claude
    grader_target: gemini-llm
    # model: claude-sonnet-4-20250514          # Optional: override model
    log_format: json  # 'summary' (default) or 'json' for raw event logs
    # system_prompt: optional override (default instructs agent to include code in response)

  # Claude SDK - direct SDK invocation (requires @anthropic-ai/claude-agent-sdk)
  - name: claude-sdk
    provider: claude-sdk
    grader_target: gemini-llm
    log_format: json
