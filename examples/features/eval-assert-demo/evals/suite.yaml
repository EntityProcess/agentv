description: script graders with eval assert CLI integration
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: capital-of-france
    expected_output: The capital of France is Paris.
    assert:
      - metric: keyword-check
        type: script
        command:
          - bun
          - run
          - ../.agentv/graders/keyword-check.ts
        description: Checks that the answer mentions Paris and France
      - metric: length-check
        type: script
        command:
          - bun
          - run
          - ../.agentv/graders/length-check.ts
        description: Ensures answer is between 5 and 50 words
      - type: contains
        value: Paris
      - Answer correctly identifies Paris as the capital of France
    vars:
      input: What is the capital of France? Answer in one concise sentence.
  - id: largest-planet
    expected_output: Jupiter is the largest planet in our solar system.
    assert:
      - type: contains
        value: Jupiter
      - Answer correctly identifies Jupiter as the largest planet
    vars:
      input: What is the largest planet in our solar system? Answer briefly.
