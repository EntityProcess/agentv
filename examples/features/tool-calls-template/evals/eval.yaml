# Tool Calls Template Variable Demo
#
# Demonstrates using {{ tool_calls }} in LLM grader prompts to check
# whether an agent invoked the right skills during execution.
#
# The {{ tool_calls }} variable provides a formatted summary of all tool
# calls from the agent's output (tool name + key inputs). This lets LLM
# graders reason about tool usage without parsing raw Message[] data.
#
# This example uses a mock CLI agent that returns tool calls in its output.
# The LLM grader then inspects the tool call summary to verify skill usage.
#
# Setup:
#   1. Set GRADER_TARGET in your .env (e.g. openrouter)
#   2. Run from repo root: bun agentv eval examples/features/tool-calls-template/evals/eval.yaml

name: tool-calls-template
description: LLM grader with {{ tool_calls }} template variable for skill verification

execution:
  target: mock_agent

tests:
  # ==========================================
  # Example 1: Verify deploy skill was triggered
  # The mock agent calls Skill(acme-deploy) + Bash(kubectl)
  # LLM grader checks tool_calls for Skill invocation
  # ==========================================
  - id: deploy-skill-triggered
    criteria: |-
      The agent should invoke the acme-deploy skill to deploy the
      payments-api service to production.
    input:
      - role: user
        content: Deploy payments-api to production using the deploy skill.
    assertions:
      - name: skill-invoked
        type: llm-grader
        prompt: file://../prompts/skill-usage-check.md

  # ==========================================
  # Example 2: Verify review-pr skill was triggered
  # The mock agent calls Skill(review-pr) + Read(files)
  # LLM grader checks tool_calls for skill invocation
  # ==========================================
  - id: review-skill-triggered
    criteria: |-
      The agent should invoke the review-pr skill to review pull request #42.
    input:
      - role: user
        content: Review pull request #42 using the review skill.
    assertions:
      - name: skill-invoked
        type: llm-grader
        prompt: file://../prompts/skill-usage-check.md

  # ==========================================
  # Example 3: Verify NO skill was triggered (negative case)
  # The mock agent only calls Read/Edit/Bash — no Skill tool
  # LLM grader checks tool_calls to confirm absence of Skill
  # ==========================================
  - id: no-skill-for-bugfix
    criteria: |-
      The agent should fix the bug using basic tools (Read, Edit, Bash)
      without invoking any skill.
    input:
      - role: user
        content: Fix the null pointer bug in auth.ts.
    assertions:
      - name: no-skill-used
        type: llm-grader
        prompt: file://../prompts/no-skill-check.md
