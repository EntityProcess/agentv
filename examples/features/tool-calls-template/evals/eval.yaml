# Tool Calls Template Variable Demo
#
# Demonstrates using {{ tool_calls }} in LLM grader prompts to check
# whether an agent invoked the right skills during execution — without
# needing the skill-trigger evaluator.
#
# The workspace template includes the acme-deploy skill in all provider
# directories (.claude/, .agents/, .copilot/, .github/) so any agent
# target can discover and use it.
#
# Run:
#   bun agentv eval examples/features/tool-calls-template/evals/eval.yaml --target copilot

name: tool-calls-template
description: LLM grader with {{ tool_calls }} template variable for skill verification

workspace:
  template: ../workspace/

execution:
  workers: 1

tests:
  - id: deploy-skill-triggered
    input: How do I deploy payments-api to production?
    assertions:
      - name: skill-invoked
        type: llm-grader
        prompt: file://../prompts/skill-usage-check.md

  - id: rollback-skill-triggered
    input: I need to roll back user-service in staging, what's the procedure?
    assertions:
      - name: skill-invoked
        type: llm-grader
        prompt: file://../prompts/skill-usage-check.md

  - id: no-skill-for-unrelated
    input: Write a Python function that parses JSON logs and extracts error messages.
    assertions:
      - name: no-skill-used
        type: llm-grader
        prompt: file://../prompts/no-skill-check.md
