targets:
  - name: mock_agent
    provider: cli
    grader_target: grader
    command: bun run ./mock-agent.ts --prompt {PROMPT} --output {OUTPUT_FILE}
    cwd: ..
    healthcheck:
      command: bun run ./mock-agent.ts --healthcheck
      cwd: ..

  - name: grader
    provider: openrouter
    model: anthropic/claude-sonnet-4
