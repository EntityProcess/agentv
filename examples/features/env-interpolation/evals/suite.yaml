description: Demonstrates {{ env.VAR }} interpolation in eval fields
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: full-value
    assert:
      - "{{ env.EVAL_ASSERTION | default(\"Responds with a friendly greeting\") }}"
    vars:
      input: Hello!
      expected_output: "{{ env.EXPECTED_GREETING }}"
  - id: partial-value
    assert:
      - Response uses the system prompt persona
    vars:
      input:
        - role: system
          content: "{{ env.CUSTOM_SYSTEM_PROMPT }}"
        - role: user
          content: Hi there!
