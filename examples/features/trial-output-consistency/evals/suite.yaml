description: Trial output consistency via embedding similarity
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: high-consistency
    expected_output:
      - role: assistant
        content: The capital of France is Paris.
    assert:
      - metric: trial-consistency
        type: script
        command:
          - bun
          - run
          - ../graders/trial-consistency.ts
        config:
          fallback: token
          trialOutputs:
            - The capital of France is Paris.
            - Paris is the capital of France.
            - France's capital city is Paris.
      - Agent produces consistent answers across trials.
    vars:
      input:
        - role: user
          content: What is the capital of France?
  - id: low-consistency
    expected_output:
      - role: assistant
        content: Any creative tagline.
    assert:
      - metric: trial-consistency
        type: script
        command:
          - bun
          - run
          - ../graders/trial-consistency.ts
        config:
          fallback: token
          trialOutputs:
            - Wake up and smell the magic.
            - Brewed with love, served with a smile.
            - Where every cup tells a story.
      - Agent produces inconsistent answers across trials.
    vars:
      input:
        - role: user
          content: Write a creative tagline for a coffee shop.
  - id: single-trial
    expected_output:
      - role: assistant
        content: "4"
    assert:
      - metric: trial-consistency
        type: script
        command:
          - bun
          - run
          - ../graders/trial-consistency.ts
        config:
          fallback: token
          trialOutputs:
            - The answer is 4.
      - Single trial returns perfect consistency.
    vars:
      input:
        - role: user
          content: What is 2 + 2?
  - id: zero-trials
    expected_output:
      - role: assistant
        content: Hi
    assert:
      - metric: trial-consistency
        type: script
        command:
          - bun
          - run
          - ../graders/trial-consistency.ts
        config:
          fallback: token
          trialOutputs: []
      - Zero trials returns an error score.
    vars:
      input:
        - role: user
          content: Hello
