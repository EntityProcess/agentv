description: Header field confusion metrics (TP/TN/FP/FN aggregation)
target: mock_extractor
assert:
  - metric: header_confusion
    type: script
    command:
      - bun
      - run
      - ../graders/header_confusion_metrics.ts
    fields:
      - path: invoice_number
      - path: invoice_date
      - path: currency
      - path: supplier.name
      - path: importer.name
      - path: gross_total
prompts:
  - "{{ input }}"
tests:
  - id: metrics-001
    assert:
      - All fields extracted correctly (all TP)
    expected_output:
      - role: assistant
        content:
          invoice_number: INV-2025-001234
          invoice_date: 15-JAN-2025
          currency: USD
          supplier:
            name: Acme Shipping
          importer:
            name: Global Trade Co
          gross_total: 1889
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/invoice-001.json
            - type: text
              value: Extract header fields.
  - id: metrics-002
    assert:
      - Supplier name has dash variation (FP+FN)
    expected_output:
      - role: assistant
        content:
          invoice_number: INV-2025-001234
          invoice_date: 15-JAN-2025
          currency: USD
          supplier:
            name: Acme Shipping
          importer:
            name: Global Trade Co
          gross_total: 1889
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/invoice-002.json
            - type: text
              value: Extract header fields.
  - id: metrics-003
    assert:
      - Supplier name has dash variation (FP+FN)
    expected_output:
      - role: assistant
        content:
          invoice_number: INV-2025-001234
          invoice_date: 15-JAN-2025
          currency: USD
          supplier:
            name: Acme Shipping
          importer:
            name: Global Trade Co
          gross_total: 1889
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/invoice-003.json
            - type: text
              value: Extract header fields.
  - id: metrics-004
    assert:
      - Invoice number missing (FN)
    expected_output:
      - role: assistant
        content:
          invoice_number: INV-2025-001234
          invoice_date: 15-JAN-2025
          currency: USD
          supplier:
            name: Acme Shipping
          importer:
            name: Global Trade Co
          gross_total: 1889
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/invoice-004.json
            - type: text
              value: Extract header fields.
  - id: metrics-005
    assert:
      - Multiple field errors (currency, supplier, gross_total)
    expected_output:
      - role: assistant
        content:
          invoice_number: INV-2025-001234
          invoice_date: 15-JAN-2025
          currency: USD
          supplier:
            name: Acme Shipping
          importer:
            name: Global Trade Co
          gross_total: 1889
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/invoice-007.json
            - type: text
              value: Extract header fields.
