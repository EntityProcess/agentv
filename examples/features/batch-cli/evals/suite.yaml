name: batch-cli
description: Batch CLI demo (AML screening) using structured input → CSV → JSONL with trace extraction
target: batch_cli
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: aml-001
    assert:
      - metric: decision-check
        type: script
        command:
          - bun
          - run
          - ../graders/check-batch-cli-output.ts
        cwd: .
      - metric: tool-trajectory-check
        type: tool-trajectory
        mode: any_order
        minimums:
          aml_screening: 1
      - Batch runner returns a JSON object with decision=CLEAR.
    vars:
      input:
        - role: system
          content: You are a deterministic AML screening batch checker. Do not use external network calls.
        - role: user
          content:
            request:
              type: aml_screening_check
              jurisdiction: AU
              effective_date: 2025-01-01
            row:
              id: aml-001
              customer_name: Example Customer A
              origin_country: NZ
              destination_country: AU
              transaction_type: INTERNATIONAL_TRANSFER
              amount: 5000
              currency: USD
      expected_output:
        - role: assistant
          content:
            decision: CLEAR
  - id: aml-002
    assert:
      - metric: decision-check
        type: script
        command:
          - bun
          - run
          - ../graders/check-batch-cli-output.ts
        cwd: .
      - metric: tool-trajectory-check
        type: tool-trajectory
        mode: any_order
        minimums:
          aml_screening: 1
      - Batch runner returns a JSON object with decision=REVIEW.
    vars:
      input:
        - role: system
          content: You are a deterministic AML screening batch checker.
        - role: user
          content:
            request:
              type: aml_screening_check
              jurisdiction: AU
              effective_date: 2025-01-01
            row:
              id: aml-002
              customer_name: Example Customer B
              origin_country: IR
              destination_country: AU
              transaction_type: INTERNATIONAL_TRANSFER
              amount: 2000
              currency: USD
      expected_output:
        - role: assistant
          content:
            decision: REVIEW
  - id: aml-003
    assert:
      - metric: decision-check
        type: script
        command:
          - bun
          - run
          - ../graders/check-batch-cli-output.ts
        cwd: .
      - metric: tool-trajectory-check
        type: tool-trajectory
        mode: any_order
        minimums:
          aml_screening: 1
      - Batch runner returns a JSON object with decision=REVIEW.
    vars:
      input:
        - role: system
          content: You are a deterministic AML screening batch checker.
        - role: user
          content:
