name: trace-analysis-demo
description: Demo eval for generating execution traces to analyze
providers:
  - llm
prompts:
  - "{{ input }}"
tests:
  - id: research-question
    assert:
      - type: contains
        value: REST
      - type: contains
        value: GraphQL
      - type: regex
        value: type.?system|schema|typed
      - Covers at least three differences including query flexibility, over-fetching, and type system
    vars:
      input: What are the key differences between REST and GraphQL APIs?
  - id: code-review-task
    assert:
      - type: contains
        value: suggest
      - type: regex
        value: improv|fix|refactor|optim
      - Identifies at least one code quality issue
    vars:
      input: Review this Python function for potential issues and suggest improvements.
  - id: simple-qa
    assert:
      - type: contains
        value: Paris
      - Correctly answers Paris
    vars:
      input: What is the capital of France?
