# Prompt Template SDK Demo
# Demonstrates using TypeScript/JavaScript files for custom evaluator prompts.
# Uses the same explicit script pattern as code_grader for consistency.

description: Demonstrates TypeScript prompt templates for custom LLM grader prompts

# Uses the default target defined in .agentv/targets.yaml
execution:
  target: llm

tests:
  - id: prompt-template-basic
    criteria: The CLI provides a clear answer about TypeScript benefits.

    input:
      - role: user
        content:
          - type: text
            value: What are the main benefits of TypeScript over JavaScript?

    expected_output:
      - role: assistant
        content: TypeScript provides static type checking, better IDE support, and improved maintainability.

    assertions:
      - name: custom-prompt-eval
        type: llm-grader
        # Executable prompt template using explicit script array (matches code_grader pattern)
        prompt:
          command: [bun, run, ../prompts/custom-evaluator.ts]

  - id: prompt-template-with-config
    criteria: The CLI explains async/await correctly.

    input:
      - role: user
        content:
          - type: text
            value: Explain async/await in JavaScript.

    expected_output:
      - role: assistant
        content: Async/await is syntactic sugar over Promises that makes asynchronous code look synchronous.

    assertions:
      - name: strict-eval
        type: llm-grader
        # Executable prompt template with config
        prompt:
          command: [bun, run, ../prompts/custom-evaluator.ts]
          config:
            rubric: |-
              - Must mention Promises
              - Must explain the synchronous-looking syntax
              - Should provide an example or use case
            strictMode: true
