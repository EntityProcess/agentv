# Prompt Template SDK Demo
# Demonstrates using TypeScript/JavaScript files for custom grader prompts.
# Uses the same explicit script pattern as script_grader for consistency.

description: Demonstrates TypeScript prompt templates for custom LLM grader prompts

# Uses the default target defined in .agentv/targets.yaml
target: llm

tests:
  - id: prompt-template-basic

    input:
      - role: user
        content:
          - type: text
            value: What are the main benefits of TypeScript over JavaScript?

    expected_output:
      - role: assistant
        content: TypeScript provides static type checking, better IDE support, and
          improved maintainability.

    assert:
      - metric: custom-prompt-eval
        type: llm-rubric
        # Executable prompt template using explicit script array.
        prompt:
          command: [ bun, run, ../prompts/custom-grader.ts ]
      - The CLI provides a clear answer about TypeScript benefits.

  - id: prompt-template-with-config

    input:
      - role: user
        content:
          - type: text
            value: Explain async/await in JavaScript.

    expected_output:
      - role: assistant
        content: Async/await is syntactic sugar over Promises that makes asynchronous
          code look synchronous.

    assert:
      - metric: strict-eval
        type: llm-rubric
        # Executable prompt template with config
        prompt:
          command: [ bun, run, ../prompts/custom-grader.ts ]
          config:
            rubric: |-
              - Must mention Promises
              - Must explain the synchronous-looking syntax
              - Should provide an example or use case
            strictMode: true
      - The CLI explains async/await correctly.
