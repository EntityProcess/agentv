description: Verify file_changes diffs are accessible to LLM grader (llm-rubric, built-in, and copilot-cli)
environment:
  type: host
  workdir: ../workspace-template
target: mock_agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-file-changes-graders
    assert:
      - metric: llm-rubric-rubrics
        type: llm-rubric
        value:
          - id: subtract-added
            outcome: The diff shows a new subtract function was added to calculator.ts
            weight: 1
            required: true
          - id: add-preserved
            outcome: The diff does not remove or modify the existing add function
            weight: 1
            required: true
          - id: valid-diff
            outcome: The file_changes contains a valid unified diff format
            weight: 0.5
      - metric: llm-rubric-builtin
        type: llm-rubric
        max_steps: 3
        temperature: 0
      - metric: llm-rubric-copilot
        type: llm-rubric
        target: copilot_grader
        temperature: 0
      - The agent must add a subtract function to src/calculator.ts. The file_changes diff should
        show the new subtract function was added. The existing add function must remain unchanged.
    vars:
      input:
        - role: user
          content:
            - type: text
              value: Add a subtract function to src/calculator.ts
