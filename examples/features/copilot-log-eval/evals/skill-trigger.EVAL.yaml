# Copilot Log + Skill-Trigger evaluation example.
#
# Reads a Copilot CLI session transcript from disk and checks which skills
# were invoked. No LLM API key needed — both the provider (copilot-log)
# and evaluator (skill-trigger) are deterministic.
#
# Prerequisites:
#   1. Run a Copilot CLI session in the workspace/ directory that triggers
#      the csv-analyzer skill (e.g., "Analyze this CSV file").
#   2. Run the eval:
#        agentv eval evals/skill-trigger.EVAL.yaml --target copilot-log
#
# The copilot-log provider discovers the latest session from
# ~/.copilot/session-state/ and parses events.jsonl into Message[].

workspace:
  template: workspace/

tests:
  # Positive: csv-analyzer skill should be triggered
  - id: should-trigger-csv-analyzer
    input: "Analyze this CSV file and tell me the top 5 months by revenue"
    assertions:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: true

  # Negative: agentv-bench skill should NOT be triggered by a CSV question
  - id: should-not-trigger-agentv-bench
    input: "Analyze this CSV file and tell me the top 5 months by revenue"
    assertions:
      - type: skill-trigger
        skill: agentv-bench
        should_trigger: false
