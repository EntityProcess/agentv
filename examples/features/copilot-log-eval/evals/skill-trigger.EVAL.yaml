# Copilot Log evaluation example — deterministic + code-grader assertions.
#
# Reads a Copilot CLI session transcript from disk and evaluates it with:
#   1. skill-trigger  — deterministic check for skill invocation
#   2. code-grader    — custom TypeScript grader inspecting full Message[]
#
# No LLM API key needed — all evaluators are deterministic.
#
# Prerequisites:
#   1. Have at least one Copilot CLI session in ~/.copilot/session-state/
#   2. Run the eval:
#        agentv eval evals/skill-trigger.EVAL.yaml --target copilot-log
#
# The copilot-log provider discovers the latest session from
# ~/.copilot/session-state/ and parses events.jsonl into Message[].

workspace:
  template: ../workspace/
  hooks:
    before_all:
      command:
        - node
        - ../../workspace-setup-script/scripts/workspace-setup.mjs
        - --from
        - ../workspace/.allagents/workspace.yaml
        - --marketplace-source
        - ../../../../.claude-plugin
        - --require
        - .github/skills/agentv-bench/SKILL.md

tests:
  # Negative case: csv-analyzer skill should NOT be triggered
  # (gpt-5-mini typically reads CSV directly without invoking skills)
  - id: should-not-trigger-csv-analyzer
    input: "Analyze this CSV file and tell me the top 5 months by revenue"
    assertions:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: false
      - name: transcript-quality
        type: code-grader
        command: ["bun", "run", "../graders/transcript-quality.ts"]
