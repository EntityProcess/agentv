name: file-changes-with-repos
description: Verify file_changes captures workspace-root files AND changes inside nested repos
environment:
  type: host
  workdir: ../workspace-template
extensions:
  - file://../scripts/setup-nested-repo.mjs:beforeAll
target: mock_agent
prompts:
  - "{{ input }}"
tests:
  - id: root-file-and-repo-change
    assert:
      - metric: check-root-and-repo-changes
        type: script
        command:
          - bun
          - run
          - ../scripts/check-file-changes.ts
      - "The agent writes report.txt to the workspace root and appends an add() function to
        my-lib/utils.ts. file_changes must show both: the new workspace-root file and the
        modification inside the nested repo."
    vars:
      input:
        - role: user
          content:
            - type: text
              value: Write a one-line summary to report.txt at the workspace root. Then add an add(a, b) function
                to my-lib/utils.ts.
