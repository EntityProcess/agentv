description: Demonstrates input_files shorthand for attaching files to test inputs
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: summarize-sales-shorthand
    assert:
      - >
        Agent summarizes the monthly revenue trends from the CSV file, identifying which product
        performed better each month and overall direction.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/sales.csv
            - type: text
              value: Summarize the monthly revenue trends in this CSV. Which product is growing faster?
  - id: summarize-sales-explicit
    assert:
      - >
        Agent summarizes the monthly revenue trends from the CSV file, identifying which product
        performed better each month and overall direction.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/sales.csv
            - type: text
              value: Summarize the monthly revenue trends in this CSV. Which product is growing faster?
  - id: compare-two-files
    assert:
      - |
        Agent compares the two data files and identifies key differences between the datasets.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/sales.csv
            - type: file
              value: ../fixtures/sales.csv
            - type: text
              value: Compare these two data files and describe any differences.
  - id: prompt-md-with-attachment
    assert:
      - |
        Agent follows the task prompt from PROMPT.md and uses the attached CSV data when answering.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../fixtures/sales.csv
            - type: text
              value: >-
                Summarize the monthly revenue trends in the attached CSV.


                Call out which product appears to be growing faster and mention one caveat about the
                sample size.
