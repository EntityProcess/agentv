description: Trace-based evaluation of agent internals using script graders
providers:
  - llm
prompts:
  - "{{ input }}"
tests:
  - id: span-count-check
    assert:
      - metric: span-count
        type: script
        command:
          - bun
          - run
          - ../graders/span-count.ts
        config:
          maxLlmCalls: 5
          maxToolCalls: 10
      - |-
        Agent completes the task with a reasonable number of
        LLM calls and tool executions.
    vars:
      input:
        - role: user
          content: Summarize the key points of this document.
  - id: error-free-execution
    assert:
      - metric: error-check
        type: script
        command:
          - bun
          - run
          - ../graders/error-spans.ts
        config:
          maxErrors: 0
      - Agent completes the task without any errors in the trace.
    vars:
      input:
        - role: user
          content: Look up the weather forecast for today.
  - id: no-forbidden-tools
    assert:
      - metric: error-and-tool-check
        type: script
        command:
          - bun
          - run
          - ../graders/error-spans.ts
        config:
          maxErrors: 0
          forbiddenTools:
            - execute_code
            - shell_command
      - |-
        Agent completes the task without calling any forbidden tools
        and without producing errors.
    vars:
      input:
        - role: user
          content: Answer the question using only approved data sources.
  - id: duration-check
    assert:
      - metric: duration-check
        type: script
        command:
          - bun
          - run
          - ../graders/span-duration.ts
        config:
          maxSpanMs: 3000
          maxTotalMs: 15000
      - |-
        No individual tool call exceeds the time threshold,
        ensuring responsive agent behavior.
    vars:
      input:
        - role: user
          content: Retrieve and format the latest sales data.
  - id: comprehensive-trace-check
    assert:
      - metric: span-count
        type: script
        command:
          - bun
          - run
          - ../graders/span-count.ts
        config:
          maxLlmCalls: 8
          maxToolCalls: 20
      - metric: error-check
        type: script
        command:
          - bun
          - run
          - ../graders/error-spans.ts
      - metric: duration-check
        type: script
        command:
          - bun
          - run
          - ../graders/span-duration.ts
        config:
          maxSpanMs: 5000
      - |-
        Agent completes the task efficiently with no errors,
        reasonable call counts, and fast execution.
    vars:
      input:
        - role: user
          content: Process this data and generate a summary report.
