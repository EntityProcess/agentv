name: tool-trajectory-simple
description: Tool trajectory grader examples for agent execution validation
target: mock_agent
prompts:
  - "{{ input }}"
tests:
  - id: any-order-pass
    assert:
      - metric: tool-usage-check
        type: trajectory:tool-used
        value:
          name: knowledgeSearch
          min: 2
      - type: trajectory:tool-used
        value:
          name: documentRetrieve
          min: 1
      - |-
        Agent successfully researches the topic by searching knowledge base multiple times
        and retrieving relevant documents.
    vars:
      input:
        - role: user
          content: Research the key differences between REST and GraphQL APIs.
  - id: in-order-pass
    assert:
      - metric: workflow-sequence
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - fetchData
            - validateSchema
            - transformData
            - saveResults
      - Agent follows the correct data processing workflow.
    vars:
      input:
        - role: user
          content: Process the customer data from the API endpoint.
  - id: exact-auth-flow
    assert:
      - metric: auth-sequence-exact
        type: trajectory:tool-sequence
        value:
          mode: exact
          steps:
            - checkCredentials
            - generateToken
            - auditLog
      - Agent performs authentication in the exact required sequence.
    vars:
      input:
        - role: user
          content: Authenticate the user with provided credentials.
  - id: metrics-check
    assert:
      - metric: metrics-tools
        type: trajectory:tool-used
        value:
          name: getCpuMetrics
          min: 1
      - type: trajectory:tool-used
        value:
          name: getMemoryMetrics
          min: 1
      - Agent uses the metrics tools to check CPU and memory.
    vars:
      input:
        - role: user
          content: What are the current system metrics for CPU and memory?
  - id: partial-match
    assert:
      - metric: tool-check
        type: trajectory:tool-used
        value:
          name: knowledgeSearch
          min: 1
      - type: trajectory:tool-used
        value:
          name: documentRetrieve
          min: 1
      - type: trajectory:tool-used
        value:
          name: generateReport
          min: 1
      - Agent should use search, retrieve, and report tools.
    vars:
      input:
        - role: user
          content: Search for information and generate a report.
  - id: exact-args-match
    assert:
      - metric: arg-validation
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - search
            - get_weather
      - type: trajectory:tool-args-match
        value:
          name: search
          args:
            query: weather Paris
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: get_weather
          args:
            location: Paris
          mode: partial
      - Agent searches for weather and retrieves forecast for the correct city.
    vars:
      input:
        - role: user
          content: What's the weather like in Paris?
  - id: skip-args-validation
    assert:
      - metric: workflow-sequence-only
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - load_data
            - transform
            - save_data
      - type: trajectory:tool-args-match
        value:
          name: load_data
          args:
            source: customers
          mode: partial
      - Agent loads data, transforms it, and saves. Arguments don't matter.
    vars:
      input:
        - role: user
          content: Load customer data, normalize it, and save
  - id: superset-mode
    assert:
      - metric: required-tools
        type: trajectory:tool-used
        value:
          name: knowledgeSearch
          min: 1
      - type: trajectory:tool-used
        value:
          name: documentRetrieve
          min: 1
      - |-
        Agent must call both search and analyze tools during execution.
        Extra tool calls are acceptable.
    vars:
      input:
        - role: user
          content: Research and analyze the data.
  - id: subset-mode
    assert:
      - metric: safe-tools-only
        type: not-trajectory:tool-used
        value:
          - writeFile
          - deleteFile
          - mutateData
      - |-
        Agent must only use approved read-only tools.
        No write or delete operations should occur.
    vars:
      input:
        - role: user
          content: Look up the current system status.
  - id: mixed-args-match
    assert:
      - metric: mixed-precision
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - fetchData
            - validateSchema
            - transformData
            - saveResults
      - Agent calls tools with varying argument precision requirements.
    vars:
      input:
        - role: user
          content: Process the customer data from the API endpoint.
  - id: field-list-match
    assert:
      - metric: check-source-only
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - fetchData
            - saveResults
      - type: trajectory:tool-args-match
        value:
          name: fetchData
          args:
            source: api
          mode: partial
      - |-
        Agent fetches data from the correct source.
        Other arguments like pagination or format don't matter.
    vars:
      input:
        - role: user
          content: Process the customer data from the API endpoint.
