name: assert-extended
description: Extended deterministic assertions for natural language validation
providers:
  - llm
prompts:
  - "{{ input }}"
tests:
  - id: contains-any-greeting
    assert:
      - type: contains-any
        value:
          - Hello
          - Hi
          - Hey
          - Welcome
          - Greetings
      - Response should include some form of greeting
    vars:
      input: Greet the user warmly. Start with Hello or Hi.
  - id: contains-all-fields
    assert:
      - type: contains-all
        value:
          - Alice
          - alice@example.com
      - Response must mention both name and email
    vars:
      input:
        - role: system
          content: Always repeat back the user's name and email exactly as given.
        - role: user
          content: "Confirm my details: name is Alice, email is alice@example.com"
  - id: icontains-keyword
    assert:
      - type: icontains
        value: error
      - Response mentions "error" in any case
    vars:
      input: Report the system status. Mention whether there are any errors.
  - id: icontains-any-missing-input
    assert:
      - type: icontains-any
        value:
          - rule code
          - rule codes
          - missing
          - need
          - provide
          - required
        required: true
      - Agent asks for missing data
    vars:
      input:
        - role: system
          content: You are a customs processing assistant. If rule codes are missing, ask for them.
        - role: user
          content: "Process this customs declaration. Country: BE. No rule codes provided."
  - id: icontains-all-required-fields
    assert:
      - type: icontains-all
        value:
          - country code
          - rule code
          - expected value
      - Response mentions all required field types
    vars:
      input:
        - role: system
          content: "When asked about customs entry fields, always mention these three: Country Code, Rule
            Codes, and Expected Values."
        - role: user
          content: What fields are needed for a customs entry?
  - id: starts-with-greeting
    assert:
      - type: starts-with
        value: Dear
      - Response starts with a formal prefix
    vars:
      input: Write a formal letter opening. Start with 'Dear Sir/Madam'.
  - id: ends-with-sign-off
    assert:
      - type: ends-with
        value: Best regards
      - Response ends with a professional sign-off
    vars:
      input: Write a brief thank you note. End your response with exactly 'Best regards'
  - id: regex-case-insensitive
    assert:
      - type: regex
        value: "[a-z]+@[a-z]+\\.[a-z]+"
        flags: i
      - Response contains an email pattern
    vars:
      input: Provide a support email address for contacting the team.
  - id: negate-contains-any
    assert:
      - type: contains-any
        value:
          - CompetitorA
          - CompetitorB
          - CompetitorC
        negate: true
      - Response must NOT mention any competitor
    vars:
      input: Describe the advantages of cloud computing. Do not mention any company names.
  - id: required-inputs-recipe
    assert:
      - metric: asks-for-rule-codes
        type: icontains-any
        value:
          - rule code
          - rule codes
        required: true
      - metric: mentions-expected-format
        type: icontains-any
        value:
          - true/false
          - true or false
          - boolean
          - expected value
          - format
      - Agent should ask for missing rule codes
    vars:
      input:
        - role: system
          content: You are a customs processing assistant. When rule codes are missing, ask the user to
            provide them in true/false format.
        - role: user
          content: Process customs entry for country BE. No other data provided.
