name: workspace-artifact
description: Verify file_changes captures generated artifacts (CSV) under workspace_path
environment:
  type: host
  workdir: ../workspace-template
target: mock_csv_agent
prompts:
  - "{{ input }}"
tests:
  - id: csv-report-generated
    assert:
      - metric: csv-in-file-changes
        type: script
        command:
          - bun
          - run
          - ../scripts/check-csv-artifact.ts
    vars:
      input:
        - role: user
          content:
            - type: text
              value: Generate a CSV report with analysis results and save it to outputs/report.csv. The CSV must
                have a header row and at least one data row.
