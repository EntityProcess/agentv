template: ./workspace-template
mode: pooled
hooks:
  on_reuse:
    reset: fast
  after_each_test:
    reset: fast
repos:
  - path: ./agentv
    source:
      type: git
      url: https://github.com/EntityProcess/agentv.git
    checkout:
      ref: main
      resolve: remote
    clone:
      depth: 1
