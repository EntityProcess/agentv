template: ./workspace-template
mode: pooled
on_reuse:
  reset: fast
repos:
  - path: ./agentv
    source:
      type: git
      url: https://github.com/EntityProcess/agentv.git
    checkout:
      ref: main
      resolve: remote
    clone:
      depth: 1
between_tests:
  reset: fast
  after_each: true
