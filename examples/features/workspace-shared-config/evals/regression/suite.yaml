description: Regression eval that references the same shared environment recipe file. Demonstrates
environment recipe reuse across eval files in different directories.
environment: file://../../environment.yaml
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-readme-exists
    assert:
      - type: contains
        value: Shared Workspace Template
      - The agent should confirm the workspace template README exists and report its contents.
    vars:
      input: Read the README.md file in the workspace root and report its contents.
