description: >-
  Regression eval that references the same shared workspace config file.
  Demonstrates workspace config reuse across eval files in different directories.

workspace: ../../workspace.yaml
tags: [agent]

tests:
  - id: verify-readme-exists
    criteria: >-
      The agent should confirm the workspace template README exists
      and report its contents.
    input: >-
      Read the README.md file in the workspace root and report its contents.
    assertions:
      - type: contains
        value: Shared Workspace Template
