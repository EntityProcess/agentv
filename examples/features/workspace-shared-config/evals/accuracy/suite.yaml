description: Accuracy eval that references a shared environment recipe file. The environment is
  defined once in workspace.yaml and reused across eval files.
environment: file://../../workspace.yaml
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-repo-exists
    assert:
      - type: contains
        value: agentv
      - The agent should confirm the agentv repo is present in the workspace and report the package
        name from package.json.
    vars:
      input: Read agentv/package.json and report the name field.
