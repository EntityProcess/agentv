name: vitest-workspace-grader
description: Deterministic workspace grading with a Vitest verifier file.
workspace:
  scope: suite
  template: ../workspace-template
target: mock_agent
prompts:
  - "{{ input }}"
tests:
  - id: welcome-banner
    assert:
      - metric: vitest-welcome-banner
        type: script
        command:
          - bun
          - ../../../../apps/cli/src/cli.ts
          - eval
          - ../graders/welcome-banner.test.ts
      - Add a welcome banner to app/page.tsx with ready status text and a dashboard link.
    vars:
      input: "Update app/page.tsx so the page shows \"Status: All systems ready\", includes the text
        \"Open dashboard\", links it to /dashboard, and leaves no TODO marker behind."
