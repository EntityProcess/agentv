name: vitest-workspace-grader
description: Deterministic workspace grading with a Vitest verifier file.

workspace:
  template: ../workspace-template

experiment:
  target: mock_agent

tests:
  - id: welcome-banner
    criteria: >-
      Add a welcome banner to app/page.tsx with ready status text and a
      dashboard link.
    input: >-
      Update app/page.tsx so the page shows "Status: All systems ready",
      includes the text "Open dashboard", links it to /dashboard, and leaves
      no TODO marker behind.
    assertions:
      - name: vitest-welcome-banner
        type: code-grader
        command:
          [
            "bun",
            "../../../../apps/cli/src/cli.ts",
            "eval",
            "../graders/welcome-banner.test.ts",
          ]
