description: Demonstrates TypeScript helpers for script_grader payloads
target: local_cli
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: script-grader-sdk-attachments
    expected_output:
      - role: assistant
        content: "Attachments detected (2): example.txt, python.instructions.md."
    assert:
      - metric: attachment-check
        type: script
        command:
          - bun
          - run
          - ../scripts/verify-attachments.ts
      - The CLI echoes the prompt and lists attachment names.
    vars:
      input:
        - role: system
          content:
            - type: file
              value: python.instructions.md
        - role: user
          content:
            - type: text
              value: Please echo this request in one short sentence and mention all attached files by name.
            - type: file
              value: example.txt
