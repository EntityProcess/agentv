name: suite-level-input-files-example
description: Suite-level input + input_files shorthands
target: llm
prompts:
  - "{{ input }}"
tests:
  - id: japan-spring
    assert:
      - |-
        Recommends visiting Japan in spring (March-April) for cherry blossoms.
        Mentions visa requirements and includes a safety tip.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ./system-prompt.md
            - type: text
              value: Use the attached context to answer travel questions.
        - role: user
          content: When is the best time to visit Japan?
  - id: iceland-northern-lights
    assert:
      - |-
        Recommends winter months (September-March) for Northern Lights.
        Mentions practical clothing advice and includes a safety tip.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ./system-prompt.md
            - type: text
              value: Use the attached context to answer travel questions.
        - role: user
          content: I want to see the Northern Lights in Iceland. When should I go?
  - id: skip-suite-defaults
    assert:
      - Provides a direct answer about currency exchange
    execution:
      skip_defaults: true
    vars:
      input: What currency does Thailand use?
