name: execution-metrics
description: Demonstrates the built-in execution_metrics grader
target: mock_metrics_agent
prompts:
  - "{{ input }}"
tests:
  - id: simple-thresholds-pass
    assert:
      - metric: efficiency-check
        type: execution-metrics
        max_tool_calls: 10
        max_tokens: 2000
        max_duration_ms: 10000
      - Agent responds efficiently within all specified limits.
    vars:
      input:
        - role: user
          content: Hello, this is a simple question.
  - id: comprehensive-thresholds
    assert:
      - metric: full-efficiency-check
        type: execution-metrics
        max_tool_calls: 15
        max_llm_calls: 5
        max_tokens: 3000
        max_cost_usd: 0.1
        max_duration_ms: 30000
      - Agent performs a task within all efficiency constraints.
    vars:
      input:
        - role: user
          content: Hello, give me a simple response.
  - id: research-with-metrics
    assert:
      - metric: trajectory-check
        type: trajectory:tool-used
        value:
          name: search
          min: 1
      - metric: metrics-check
        type: execution-metrics
        max_tool_calls: 20
        max_tokens: 5000
      - |-
        Agent performs research and uses tools efficiently.
        Metrics reflect reasonable token usage and tool calls.
    vars:
      input:
        - role: user
          content: Research and analyze the topic of machine learning.
  - id: exploration-ratio-check
    assert:
      - metric: exploration-balance
        type: execution-metrics
        target_exploration_ratio: 0.5
        exploration_tolerance: 0.3
      - |-
        Agent maintains a good balance of exploration (reading) vs
        action (writing/editing) tool calls.
    vars:
      input:
        - role: user
          content: Implement a small code improvement based on the existing file.
  - id: cost-budget-check
    assert:
      - metric: cost-check
        type: execution-metrics
        max_cost_usd: 0.05
        weight: 2
      - Agent completes the task within the specified cost budget.
    vars:
      input:
        - role: user
          content: Generate a brief summary.
  - id: hybrid-evaluation
    assert:
      - metric: metric-thresholds
        type: execution-metrics
        max_tool_calls: 10
        max_duration_ms: 5000
      - metric: custom-check
        type: script
        command:
          - bun
          - run
          - ../scripts/check-metrics-present.ts
      - Agent passes both declarative thresholds and custom evaluation.
    vars:
      input:
        - role: user
          content: Process the data efficiently.
