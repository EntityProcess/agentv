tags:
  - agent
target: copilot-transcript-replay
extensions:
  - file://../scripts/copilot-replay-workspace.mjs:beforeAll
workspace:
  scope: suite
  template: ../workspace/
prompts:
  - "{{ input }}"
tests:
  - id: should-not-trigger-csv-analyzer
    assert:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: false
      - metric: transcript-quality
        type: script
        command:
          - bun
          - run
          - ../graders/transcript-quality.ts
    vars:
      input: Analyze this CSV file and tell me the top 5 months by revenue
