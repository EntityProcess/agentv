# Multi-provider skill-trigger evaluation example.
#
# The same EVAL.yaml works with any provider — just change --target:
#
#   agentv eval this-file.EVAL.yaml --target claude
#   agentv eval this-file.EVAL.yaml --target copilot
#   agentv eval this-file.EVAL.yaml --target pi-coding-agent
#
# The evaluator automatically resolves the correct tool names for each
# provider. No provider-specific config needed in test cases.

tests:
  # === Positive cases: skill should trigger ===

  - id: should-trigger-direct-request
    input: "Analyze this CSV file and tell me the top 5 months by revenue"
    assertions:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: true

  - id: should-trigger-casual-phrasing
    input: "hey can you look at sales-data.csv and figure out which quarter had the most growth"
    assertions:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: true

  # === Negative cases: skill should NOT trigger ===

  - id: should-not-trigger-unrelated
    input: "What time is it in Tokyo right now?"
    assertions:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: false

  - id: should-not-trigger-near-miss
    input: "Help me write a Python script that reads CSV files using pandas"
    assertions:
      - type: skill-trigger
        skill: csv-analyzer
        should_trigger: false
