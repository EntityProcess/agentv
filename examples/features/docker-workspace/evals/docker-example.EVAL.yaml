name: docker-workspace-example
description: Example eval using Docker workspace for grading
target: mock_agent
workspace:
  scope: suite
  docker:
    image: python:3.11-slim
    timeout: 300
    memory: 2g
    cpus: 1
prompts:
  - "{{ input }}"
tests:
  - id: hello-world
    assert:
      - type: script
        command:
          - python
          - -c
          - "import sys, json; data = json.load(sys.stdin); print(json.dumps({'score': 1.0,
            'assertions': [{'text': 'grader ran in container', 'passed': True}]}))"
      - The output should contain a working Python function
    vars:
      input: Write a Python function that returns 'hello world'
