description: >-
  Demonstrates using a before_all workspace setup script to clean and
  re-initialize an allagents workspace before evaluation runs.

workspace:
  template: ../workspace-template
  hooks:
    before_all:
      command:
        - node
        - ../scripts/workspace-setup.mjs
        - --from
        - ../workspace-template/.allagents/workspace.yaml
        - --marketplace-source
        - ../marketplace
        - --require
        - AGENTS.md
        - --require
        - .github/prompts/summarize-repo.prompt.md
  repos:
    - path: ./my-repo
      source:
        type: git
        url: https://github.com/EntityProcess/agentv.git
      checkout:
        ref: main
        resolve: local
      clone:
        depth: 1
execution:
  target: copilot

tests:
  - id: verify-workspace
    criteria: >-
      The agent should confirm that the workspace contains a cloned repository
      at my-repo/ with a valid package.json.
    input: >-
      List the files in the my-repo/ directory and read my-repo/package.json.
      Report the package name.
    assertions:
      - type: contains
        value: "@agentv/workspace"

  - id: summarize-repo
    criteria: >-
      The agent should follow the prompt instructions and report the
      package name, version, description, and key dependencies from
      my-repo/package.json.
    input:
      - role: user
        content:
          - type: file
            value: ../plugins/my-plugin/AGENTS.md
          - type: file
            value: ../plugins/my-plugin/.github/prompts/summarize-repo.prompt.md
