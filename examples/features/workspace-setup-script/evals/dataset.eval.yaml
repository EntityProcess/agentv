description: >-
  Demonstrates using a before_all workspace setup script to clean and
  re-initialize an allagents workspace before evaluation runs.

workspace:
  template: ../workspace-template
  hooks:
    before_all_tests:
      command:
        - node
        - ../scripts/workspace-setup.mjs
        - --from
        - ../workspace-template/.allagents/workspace.yaml
        - --require
        - AGENTS.md
    on_reuse:
      reset: fast
  repos:
    - path: ./my-repo
      source:
        type: git
        url: https://github.com/EntityProcess/agentv.git
      checkout:
        ref: main
        resolve: local
      clone:
        depth: 1
execution:
  target: copilot

tests:
  - id: verify-workspace
    criteria: >-
      The agent should confirm that the workspace contains a cloned repository
      at my-repo/ with a valid package.json.
    input: >-
      List the files in the my-repo/ directory and read my-repo/package.json.
      Report the package name.
    assert:
      - type: contains
        value: "@agentv/workspace"

  - id: verify-workspace-with-agents-md
    criteria: >-
      The agent should follow the instructions in AGENTS.md and report the
      package name, version, and description from my-repo/package.json.
    input:
      - role: user
        content:
          - type: file
            value: ../guidelines/AGENTS.md
          - type: text
            value: Follow the instructions in the guidelines above.
