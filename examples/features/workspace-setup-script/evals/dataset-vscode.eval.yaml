description: Demonstrates using a beforeAll lifecycle extension with the VSCode target. Same as
  suite.yaml but uses vscode instead of copilot.
extensions:
  - file://../scripts/workspace-setup.mjs:beforeAll
environment:
  type: host
  workdir: ../workspace-template
  setup:
    command:
      - bash
      - ../scripts/materialize-repo.sh
      - ./my-repo
      - https://github.com/EntityProcess/agentv.git
      - main
    cwd: "."
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-workspace
    assert:
      - type: contains
        value: "@agentv/workspace"
      - The agent should confirm that the workspace contains a cloned repository at my-repo/ with a
        valid package.json.
    vars:
      input: List the files in the my-repo/ directory and read my-repo/package.json. Report the package
        name.
