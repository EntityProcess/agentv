description: >-
  Demonstrates using a beforeAll lifecycle extension with the VSCode target.
  Same as suite.yaml but uses vscode instead of copilot.

extensions:
  - file://../scripts/workspace-setup.mjs:beforeAll

workspace:
  template: ../workspace-template
  hooks:
    after_each:
      reset: fast
  repos:
    - path: ./my-repo
      repo: https://github.com/EntityProcess/agentv.git
      commit: main
tags: [ agent ]

tests:
  - id: verify-workspace
    input: >-
      List the files in the my-repo/ directory and read my-repo/package.json.
      Report the package name.
    assert:
      - type: contains
        value: "@agentv/workspace"
      - >-
        The agent should confirm that the workspace contains a cloned repository
        at my-repo/ with a valid package.json.
