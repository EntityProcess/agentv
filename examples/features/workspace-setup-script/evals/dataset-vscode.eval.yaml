description: >-
  Demonstrates using a before_all workspace setup script with the VSCode target.
  Same as dataset.eval.yaml but uses vscode instead of copilot.

workspace:
  template: ../workspace-template
  hooks:
    before_all:
      command:
        - node
        - ../scripts/workspace-setup.mjs
        - --from
        - ../workspace-template/.allagents/workspace.yaml
        - --marketplace-source
        - ../marketplace
        - --require
        - AGENTS.md
        - --require
        - .github/prompts/summarize-repo.prompt.md
    after_each:
      reset: fast
  repos:
    - path: ./my-repo
      source:
        type: git
        url: https://github.com/EntityProcess/agentv.git
      checkout:
        ref: main
        resolve: local
      clone:
        depth: 1
execution:
  target: agent

tags: [agent]

tests:
  - id: verify-workspace
    criteria: >-
      The agent should confirm that the workspace contains a cloned repository
      at my-repo/ with a valid package.json.
    input: >-
      List the files in the my-repo/ directory and read my-repo/package.json.
      Report the package name.
    assertions:
      - type: contains
        value: "@agentv/workspace"
