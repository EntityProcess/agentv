description: Demonstrates using a beforeAll lifecycle extension to clean and re-initialize an
  allagents workspace before evaluation runs.
extensions:
  - file://../scripts/workspace-setup.mjs:beforeAll
environment:
  type: host
  workdir: ../workspace-template
  setup:
    command:
      - bash
      - ../scripts/materialize-repo.sh
      - ./my-repo
      - https://github.com/EntityProcess/agentv.git
      - main
    cwd: "."
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-workspace
    assert:
      - type: contains
        value: "@agentv/workspace"
      - The agent should confirm that the workspace contains a cloned repository at my-repo/ with a
        valid package.json.
    vars:
      input: List the files in the my-repo/ directory and read my-repo/package.json. Report the package
        name.
  - id: summarize-repo
    assert:
      - The agent should follow the prompt instructions and report the package name, version,
        description, and key dependencies from my-repo/package.json.
    vars:
      input:
        - role: user
          content:
            - type: file
              value: ../plugins/my-plugin/AGENTS.md
            - type: file
              value: ../plugins/my-plugin/.github/prompts/summarize-repo.prompt.md
