name: weighted-graders-examples
providers:
  - llm
prompts:
  - "{{ input }}"
tests:
  - id: weighted-multi-grader
    assert:
      - metric: safety-check
        type: llm-rubric
        prompt: file://../prompts/safety-check.md
        weight: 3
      - metric: quality-check
        type: llm-rubric
        prompt: file://../prompts/quality-evaluation.md
        weight: 2
      - metric: style-check
        type: llm-rubric
        prompt: file://../prompts/style-evaluation.md
        weight: 1
      - |
        The response should be accurate, safe, and well-structured.
    vars:
      input:
        - role: user
          content: Explain the concept of neural networks.
      expected_output:
        - role: assistant
          content: >
            Neural networks are computational models inspired by biological neurons. They consist of
            interconnected layers of nodes (neurons) that process information through weighted
            connections. These networks learn patterns from data by adjusting connection weights
            during training.
  - id: experimental-grader-disabled
    assert:
      - metric: accuracy
        type: llm-rubric
        prompt: file://../prompts/accuracy-check.md
        weight: 1
      - metric: experimental-metric
        type: llm-rubric
        prompt: file://../prompts/experimental-check.md
        weight: 0
      - |
        The response should be accurate and complete.
    vars:
      input:
        - role: user
          content: What is reinforcement learning?
      expected_output:
        - role: assistant
          content: >
            Reinforcement learning is a type of machine learning where an agent learns to make
            decisions by interacting with an environment. The agent receives rewards or penalties
            for its actions and learns to maximize cumulative rewards over time.
  - id: equal-weights-default
    assert:
      - metric: correctness
        type: llm-rubric
        prompt: file://../prompts/correctness-check.md
      - metric: completeness
        type: llm-rubric
        prompt: file://../prompts/completeness-check.md
      - metric: clarity
        type: llm-rubric
        prompt: file://../prompts/clarity-check.md
      - |
        The response should be comprehensive and accurate.
    vars:
      input:
        - role: user
          content: Describe deep learning.
      expected_output:
        - role: assistant
          content: >
            Deep learning is a subset of machine learning that uses neural networks with multiple
            layers (deep neural networks). Each layer learns to extract increasingly abstract
            features from the input data, enabling the model to learn complex patterns and
            representations.
