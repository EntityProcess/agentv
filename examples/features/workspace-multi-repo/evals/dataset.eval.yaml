description: >-
  Demonstrates a multi-repo workspace. Two repos (agentv and
  allagents) are cloned into the workspace.

workspace:
  template: ../workspace-template
  hooks:
    after_each:
      reset: fast
  repos:
    - path: ./agentv
      source:
        type: git
        url: https://github.com/EntityProcess/agentv.git
      checkout:
        ref: main
        resolve: remote
      clone:
        depth: 1
    - path: ./allagents
      source:
        type: git
        url: https://github.com/EntityProcess/allagents.git
      checkout:
        ref: main
        resolve: remote
      clone:
        depth: 1

tags: [agent]

tests:
  - id: verify-multi-repo
    criteria: >-
      The agent should confirm both repos are present in the workspace and
      report the package name from each repo's package.json.
    input: >-
      Read agentv/package.json and allagents/package.json. Report the name
      field from each.
    assertions:
      - type: contains
        value: agentv
