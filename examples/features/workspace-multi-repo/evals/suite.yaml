description: Demonstrates a multi-repo workspace. Two repos (agentv and allagents) are cloned into
  the workspace.
environment:
  type: host
  workdir: ../workspace-template
  setup:
    command:
      - bash
      - ../scripts/materialize-repos.sh
      - ./agentv=https://github.com/EntityProcess/agentv.git@main
      - ./allagents=https://github.com/EntityProcess/allagents.git@main
    cwd: "."
tags:
  - agent
prompts:
  - "{{ input }}"
tests:
  - id: verify-multi-repo
    assert:
      - type: contains
        value: agentv
      - The agent should confirm both repos are present in the workspace and report the package name
        from each repo's package.json.
    vars:
      input: Read agentv/package.json and allagents/package.json. Report the name field from each.
