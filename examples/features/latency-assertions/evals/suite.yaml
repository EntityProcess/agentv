name: latency-assertions
description: Latency assertions for per-step performance validation
target: mock_latency_agent
prompts:
  - "{{ input }}"
tests:
  - id: latency-pass
    assert:
      - metric: fast-read
        type: tool-trajectory
        mode: in_order
        expected:
          - tool: Read
            max_duration_ms: 200
      - Agent reads the config file quickly.
    vars:
      input:
        - role: user
          content: Read the config.json file.
  - id: latency-fail
    assert:
      - metric: slow-read
        type: tool-trajectory
        mode: in_order
        expected:
          - tool: Read
            max_duration_ms: 10
      - Agent reads the file but takes too long.
    vars:
      input:
        - role: user
          content: Read the large-file.json.
  - id: mixed-latency
    assert:
      - metric: data-pipeline-perf
        type: tool-trajectory
        mode: in_order
        expected:
          - tool: fetchData
            max_duration_ms: 1000
          - tool: validateSchema
          - tool: transformData
            max_duration_ms: 500
          - tool: saveResults
            max_duration_ms: 200
      - |-
        Agent performs data processing workflow with timing constraints
        on critical operations.
    vars:
      input:
        - role: user
          content: Process the customer data from the API.
  - id: exact-with-latency
    assert:
      - metric: auth-perf
        type: tool-trajectory
        mode: exact
        expected:
          - tool: checkCredentials
            max_duration_ms: 100
          - tool: generateToken
            max_duration_ms: 50
          - tool: auditLog
            max_duration_ms: 200
      - Agent authenticates user with performance requirements.
    vars:
      input:
        - role: user
          content: Authenticate the user with provided credentials.
  - id: latency-with-args
    assert:
      - metric: weather-perf
        type: tool-trajectory
        mode: in_order
        expected:
          - tool: search
            args:
              query: weather Paris
            max_duration_ms: 500
          - tool: get_weather
            args:
              location: Paris
            max_duration_ms: 1000
      - Agent searches for weather with specific query and responds quickly.
    vars:
      input:
        - role: user
          content: What's the weather like in Paris?
