name: latency-assertions
description: Tool sequence checks for the latency demo target
providers:
  - mock_latency_agent
prompts:
  - "{{ input }}"
tests:
  - id: latency-pass
    assert:
      - metric: fast-read
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - Read
      - Agent reads the config file.
    vars:
      input:
        - role: user
          content: Read the config.json file.
  - id: latency-fail
    assert:
      - metric: slow-read
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - Read
      - Agent reads the file.
    vars:
      input:
        - role: user
          content: Read the large-file.json.
  - id: mixed-latency
    assert:
      - metric: data-pipeline-perf
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - fetchData
            - validateSchema
            - transformData
            - saveResults
      - |-
        Agent performs the data processing workflow in the expected order.
    vars:
      input:
        - role: user
          content: Process the customer data from the API.
  - id: exact-with-latency
    assert:
      - metric: auth-perf
        type: trajectory:tool-sequence
        value:
          mode: exact
          steps:
            - checkCredentials
            - generateToken
            - auditLog
      - Agent authenticates the user with the expected tool sequence.
    vars:
      input:
        - role: user
          content: Authenticate the user with provided credentials.
  - id: latency-with-args
    assert:
      - metric: weather-perf
        type: trajectory:tool-sequence
        value:
          mode: in_order
          steps:
            - search
            - get_weather
      - type: trajectory:tool-args-match
        value:
          name: search
          args:
            query: weather Paris
          mode: partial
      - type: trajectory:tool-args-match
        value:
          name: get_weather
          args:
            location: Paris
          mode: partial
      - Agent searches for weather with the specific query.
    vars:
      input:
        - role: user
          content: What's the weather like in Paris?
