targets:
  - id: pi-rpc-local
    provider: pi-rpc
    model: "{{ env.LOCAL_OPENAI_PROXY_MODEL }}"
    config:
      runtime: host
      command:
        - pi
      subprovider: azure
      base_url: "{{ env.LOCAL_OPENAI_PROXY_BASE_URL }}"
      api_key: "[redacted]"
      tools: read
      thinking: low
      timeout_seconds: 120
