description: >-
  Tests whether agent-produced output is structurally and factually correct
  given bundled-skill content as ground truth — covers eval YAML structure,
  CLI command syntax, fixture-content accuracy, and grader configuration.

tags: [agent, skills]

tests:
  - id: yaml-valid-structure
    criteria: Agent produces eval YAML with the canonical AgentV fields.
    input:
      - role: user
        content:
          - type: file
            value: fixtures/agentv-eval-writer.txt
          - type: text
            value: |
              Using the agentv-eval-writer skill above as your reference,
              produce a minimal but valid `.eval.yaml` snippet (one `description`
              and one test in `tests:`) for an eval that grades whether an LLM
              correctly summarises a paragraph.

              Output **only** the YAML — no surrounding prose or fences.
    assertions:
      - type: contains
        value: "description:"
      - type: contains
        value: "tests:"
      - type: regex
        value: "-\\s+id:\\s+\\S"
      - type: rubrics
        criteria:
          - "Has top-level `description:` and `tests:` keys"
          - "At least one test under `tests:` has both `id:` and either `criteria:` or `input:` (or both)"
          - Uses snake_case keys (no camelCase like `testId` or `expectedOutput`)
          - YAML is syntactically valid (consistent indentation, no tab/space mixing)

  - id: yaml-assertion-types-valid
    criteria: Agent uses canonical assertion type names from the AgentV registry.
    input:
      - role: user
        content:
          - type: file
            value: fixtures/agentv-eval-writer.txt
          - type: text
            value: |
              Using the agentv-eval-writer skill as reference, write a single
              test entry under `tests:` that uses **three** assertions:
              one `contains`, one `regex`, and one `rubrics` (with at least
              two criteria). Output only the YAML for the test entry.
    assertions:
      - type: regex
        value: "type:\\s+contains"
      - type: regex
        value: "type:\\s+regex"
      - type: regex
        value: "type:\\s+rubrics"
      - type: rubrics
        criteria:
          - "Each assertion has both a `type:` and the field that type expects (`value:` for contains/regex, `criteria:` list for rubrics)"
          - Does not invent assertion types that are not in the agentv-eval-writer skill (e.g., `like`, `match`, `expect`)
          - Uses kebab-case (e.g., `llm-grader`, `is-json`) not snake_case (e.g., `llm_grader`) for any multi-word grader types referenced

  - id: cli-command-correct-syntax
    criteria: Agent produces correct `agentv skills` CLI commands with valid subcommands and flags.
    input:
      - role: user
        content:
          - type: file
            value: /skills-data/agentv-bench/SKILL.md
          - type: text
            value: |
              Give me three shell commands, one per line, that exercise the
              `agentv skills` subcommand:
              1. List all bundled skills as JSON.
              2. Print the agentv-bench skill including its references and templates.
              3. Print the on-disk path of the agentv-bench skill.
    assertions:
      - type: regex
        value: "agentv\\s+skills\\s+list\\s+--json"
      - type: regex
        value: "agentv\\s+skills\\s+get\\s+agentv-bench\\s+--full"
      - type: regex
        value: "agentv\\s+skills\\s+path\\s+agentv-bench"

  - id: fixture-content-accurate
    criteria: Agent's description of a skill matches the skill's actual SKILL.md content.
    input:
      - role: user
        content:
          - type: file
            value: fixtures/agentv-trace-analyst.txt
          - type: text
            value: |
              Read the agentv-trace-analyst skill above. In one paragraph,
              describe what this skill does and when it should be invoked.
              Quote at most one short phrase from the skill text; do not
              invent capabilities the skill does not mention.
    assertions:
      - type: rubrics
        criteria:
          - Description accurately reflects what agentv-trace-analyst does (analysing eval traces and failure modes)
          - Does not claim the skill writes or runs evals (those are agentv-eval-writer and agentv-bench respectively)
          - Any quoted phrase appears verbatim in the fixture
          - Does not hallucinate sub-features not present in the SKILL.md

  - id: skill-list-complete
    criteria: Agent lists all six bundled skills when given the JSON fixture.
    input:
      - role: user
        content:
          - type: file
            value: fixtures/skills-list-all.txt
          - type: text
            value: |
              The JSON above is the output of `agentv skills list --json`.
              Reproduce the list of skill names as a markdown bulleted list.
    assertions:
      - type: contains
        value: agentv-bench
      - type: contains
        value: agentv-eval-review
      - type: contains
        value: agentv-eval-writer
      - type: contains
        value: agentv-governance
      - type: contains
        value: agentv-onboarding
      - type: contains
        value: agentv-trace-analyst
      - type: rubrics
        criteria:
          - Lists exactly the six skill names from the JSON, no more and no fewer
          - Does not invent additional skill names not present in the fixture

  - id: error-message-accurate
    criteria: Agent correctly interprets the not-found error and proposes a recoverable next step.
    input:
      - role: user
        content:
          - type: file
            value: fixtures/skills-get-nonexistent.txt
          - type: text
            value: |
              The output above came from running `agentv skills get does-not-exist`.
              In two sentences, explain (a) what error the user hit and
              (b) the single most useful command to run next.
    assertions:
      - type: rubrics
        criteria:
          - Identifies that `does-not-exist` is not a recognised skill name
          - "Proposes either `agentv skills list` or selecting one of the names from the error's \"Available skills:\" line"
          - Does not blame missing installation or recommend re-running `npm install -g agentv`

  - id: grader-config-valid
    criteria: Agent configures an llm-grader with the fields the AgentV registry expects.
    input:
      - role: user
        content:
          - type: file
            value: fixtures/agentv-eval-writer.txt
          - type: text
            value: |
              Using the agentv-eval-writer skill as reference, produce a YAML
              snippet for **one** assertion that uses `type: llm-grader` to
              grade an answer's correctness. Include whatever fields the
              skill says an `llm-grader` requires (e.g., target/model, rubric
              criteria). Output only the YAML for the single assertion.
    assertions:
      - type: regex
        value: "type:\\s+llm-grader"
      - type: rubrics
        criteria:
          - "Uses `type: llm-grader` (kebab-case), not `type: llm_grader` or `type: llmGrader`"
          - Includes the fields the skill documents for llm-grader (typically a rubric/criteria field; may also include a target/model)
          - Does not invent fields not mentioned in the skill (e.g., a fabricated `model_provider` field)
