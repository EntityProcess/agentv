target: local-openai
prompts:
  - "{{ input }}"
tests:
  - id: greeting
    expected_output: Hello! How can I help you today?
    vars:
      input: Hello!
    assert:
      - metric: llm-rubric
        type: llm-rubric
        prompt: undefined
        rubrics:
          - id: rubric-1
            outcome: The assistant responds with a friendly greeting
            weight: 1
            required: true
        weight: 1
      - metric: llm-rubric
        type: llm-rubric
        prompt: undefined
        rubrics:
          - id: rubric-1
            outcome: Response has a professional, helpful, and polite tone
            weight: 1
            required: true
        weight: 1
