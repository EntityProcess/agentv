target: docker-cli-live-graded
prompts:
  - "{{ input }}"
tests:
  - id: docker-workdir-live-grader
    vars:
      input: Confirm the Docker environment workdir.
    assert:
      - metric: llm-rubric
        type: llm-rubric
        prompt: undefined
        rubrics:
          - id: rubric-1
            outcome: The output must say docker-workdir-ok and must not report any error.
            weight: 1
            required: true
        weight: 1
