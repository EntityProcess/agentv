execution:
  target: default
tests:
  - id: exp-low-006
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'Low' risk. Food processing equipment
      is not controlled. Standard industrial trade to allied nation.
    expected_output:
      - role: assistant
        content:
          risk_level: Low
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: IT
              Destination: US
              Product: Commercial pasta extruder machine
              HS Code: 8438.10
              Consignee: Italian Foods Inc
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
