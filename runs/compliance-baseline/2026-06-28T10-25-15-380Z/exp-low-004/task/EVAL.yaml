execution:
  target: default
tests:
  - id: exp-low-004
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'Low' risk. Medical diagnostic equipment
      for hospital use is not controlled. Standard healthcare trade.
    expected_output:
      - role: assistant
        content:
          risk_level: Low
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: NL
              Destination: BR
              Product: Ultrasound diagnostic imaging system
              HS Code: 9018.12
              Consignee: Hospital das Clinicas
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
