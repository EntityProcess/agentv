execution:
  target: default
tests:
  - id: exp-med-001
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'Medium' risk. Switching/routing apparatus
      is on CHPL (8517.62) but destination is low-risk allied nation.
      Requires verification of end-user and specifications.
    expected_output:
      - role: assistant
        content:
          risk_level: Medium
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: US
              Destination: JP
              Product: Enterprise network switch with routing capabilities
              HS Code: 8517.62
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
