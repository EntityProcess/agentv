execution:
  target: default
tests:
  - id: exp-low-002
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'Low' risk. Standard industrial motors
      (not high-performance/precision) are not controlled.
    expected_output:
      - role: assistant
        content:
          risk_level: Low
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: DE
              Destination: MX
              Product: AC induction motor for HVAC system (7.5kW)
              HS Code: 8501.52
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
