execution:
  target: default
tests:
  - id: exp-low-001
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'Low' risk. Consumer electronics displays
      are not on CHPL. Standard commercial trade between allied nations.
    expected_output:
      - role: assistant
        content:
          risk_level: Low
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: KR
              Destination: AU
              Product: OLED television display panel (65 inch, 4K resolution)
              HS Code: 8528.72
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
