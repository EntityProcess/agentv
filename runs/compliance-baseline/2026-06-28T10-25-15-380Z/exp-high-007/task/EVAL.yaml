execution:
  target: default
tests:
  - id: exp-high-007
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'High' risk. Telescopic sights and optical
      devices are CHPL Tier 3.B items used in weapons targeting systems.
    expected_output:
      - role: assistant
        content:
          risk_level: High
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: DE
              Destination: PK
              Product: Thermal imaging riflescope (12 micron VOx sensor)
              HS Code: 9013.10
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
