execution:
  target: default
tests:
  - id: exp-high-006
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'High' risk. Aircraft/UAV parts are CHPL
      Tier 3.B items with direct military applications.
    expected_output:
      - role: assistant
        content:
          risk_level: High
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: US
              Destination: CN
              Product: Carbon fiber UAV airframe components
              HS Code: 8807.30
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
