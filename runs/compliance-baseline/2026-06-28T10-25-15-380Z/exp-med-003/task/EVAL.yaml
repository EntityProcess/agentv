execution:
  target: default
tests:
  - id: exp-med-003
    conversation_id: export-screening
    criteria: |
      AI correctly classifies as 'Medium' risk. Optical instruments may
      be controlled depending on specifications. Destination is moderate
      risk. Requires technical review.
    expected_output:
      - role: assistant
        content:
          risk_level: Medium
    input:
      - role: user
        content:
          - type: file
            value: files/examples/showcase/export-screening/skills/export-risk-assessment.md
          - type: text
            value: |
              Assess export risk for this shipment:

              Origin: DE
              Destination: IN
              Product: Industrial machine vision camera system
              HS Code: 9013.80
    assertions:
      - name: risk_assessment_quality
        type: code-grader
        command:
          - bun
          - run
          - validate_risk_output.ts
        cwd: undefined
