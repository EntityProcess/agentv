name: input-test
prompts:
  - "{{ input }}"
tests:
  - id: test-01
    assert:
      - metric: echoes_input
        type: llm-rubric
        value: Response echoes the input
      - metric: contains_hello
        type: script
        command: node grader-score-1.js
        weight: 1
      - metric: relevance
        type: llm-rubric
        value: Did the response echo the input?
        weight: 2
    vars:
      input: hello world
