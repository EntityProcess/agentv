name: builtin-test
tests:
  - id: test-01
    input: hello world
    criteria: Response echoes the input
    assert:
      - metric: has_hello
        type: contains
        value: hello
      - metric: matches_pattern
        type: regex
        value: "h[aeiou]llo"
      - metric: is_valid_json
        type: is-json
